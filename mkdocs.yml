# =============================================================================
# MkDocs Configuration
# =============================================================================

# Site Information
site_name: ST Lab
site_description: SMPTE ST 2110 engineering design and simulation platform
site_author: Capp3

# Repository
repo_url: https://github.com/Capp3/STLab
repo_name: STLab
theme:
  name: readthedocs

# Plugins
plugins:
  - search

# Built static site output (GitHub Pages artifact path)
site_dir: site

# Markdown Extensions
markdown_extensions:
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page Tree / Navigation
nav:
  - Home: index.md
  - Research:
      - research/index.md
      - Master package: research/report-master.md
      - ST 2110: research/report-st2110.md
      - PTP and timing: research/report-ptp.md
      - Bandwidth: research/report-bandwidth.md
      - AES67: research/report-aes67.md
      - TTML: research/report-ttml.md

# MathJax 3 (client-side render for pymdownx.arithmatex generic output)
extra_javascript:
  - javascripts/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js

# Extra Configuration
extra:
  social:
    # Add your social links here
    # - icon: fontawesome/brands/github
    #   link: https://github.com/yourusername
    # - icon: fontawesome/brands/twitter
    #   link: https://twitter.com/yourusername

